services:
  postgres:
    image: postgres:16
    container_name: study_planner_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: studyuser
      POSTGRES_PASSWORD: studypassword
      POSTGRES_DB: study_planner
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studyuser -d study_planner"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
