services:
  postgres:
    image: postgres:16
    container_name: expense_tracker_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: expenseuser
      POSTGRES_PASSWORD: expensepassword
      POSTGRES_DB: expense_tracker
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U expenseuser -d expense_tracker"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
